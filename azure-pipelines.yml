  - stage: Deploy
    displayName: Deploy to Azure Container App
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: Update container app image
        steps:
          - task: AzureCLI@2
            displayName: Deploy latest image to Container App
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Setting variables"
                ACR_LOGIN_SERVER=$(az acr show \
                  --name $(acrName) \
                  --query loginServer \
                  --output tsv)

                IMAGE_TAG=$(tag)
                IMAGE_NAME=$ACR_LOGIN_SERVER/$(imageName):$IMAGE_TAG

                echo "Updating Container App with image: $IMAGE_NAME"

                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $IMAGE_NAME